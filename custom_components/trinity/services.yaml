display_moon:
  name: Display moon
  description: Render the current moon phase and push it to the Trinity display. Becomes the new default.
  fields:
    display_for:
      name: Display for
      description: Revert to the previous default after this many seconds.
      required: false
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds

display_now_playing:
  name: Display now playing
  description: Fetch album art and overlay track/artist text from a media player entity. Becomes the new default.
  fields:
    entity_id:
      name: Media player
      description: The media player entity to read art and metadata from.
      required: true
      selector:
        entity:
          domain: media_player
    display_for:
      name: Display for
      description: Revert to the previous default after this many seconds.
      required: false
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds

display_image:
  name: Display image
  description: Push any image to the display. Centre-cropped and resized to 64×64. Becomes the new default unless display_for is set.
  fields:
    path:
      name: Path
      description: Absolute path to a PNG or JPG file. Mutually exclusive with entity_id and url.
      required: false
      example: /config/www/image.jpg
      selector:
        text:
    entity_id:
      name: Camera or image entity
      description: A camera or image entity to snapshot and display. Mutually exclusive with path and url.
      required: false
      selector:
        entity:
          domain:
            - camera
            - image
    url:
      name: URL
      description: A remote HTTP/HTTPS image URL to fetch and display. Mutually exclusive with path and entity_id. Not cached.
      required: false
      example: "https://example.com/bird.jpg"
      selector:
        text:
    line1:
      name: Line 1
      description: First line of text to overlay on the image (max 15 characters).
      required: false
      example: "Robin"
      selector:
        text:
    line2:
      name: Line 2
      description: Second line of text to overlay on the image (max 15 characters).
      required: false
      example: "first time!"
      selector:
        text:
    display_for:
      name: Display for
      description: Revert to the previous default after this many seconds.
      required: false
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds

display_stream:
  name: Display stream
  description: >
    Repeatedly snapshot a camera entity and push frames to the display for the
    given duration (~6 FPS). Reverts to the default display when the duration elapses
    or another display action is triggered.
  fields:
    entity_id:
      name: Camera entity
      description: The camera entity to stream from.
      required: true
      selector:
        entity:
          domain: camera
    stream_for:
      name: Stream for
      description: How many seconds to stream before reverting to the default display.
      required: true
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds
    crop:
      name: Crop anchor
      description: Which part of the camera frame to crop to. Defaults to center.
      required: false
      example: top_right
      selector:
        select:
          options:
            - center
            - top_left
            - top_right
            - bottom_left
            - bottom_right

display_emoji:
  name: Display emoji
  description: >
    Fetch a Twemoji image and display it at 64×64. Accepts the emoji character
    directly (🔔) or its name with or without colons (bell or :bell:).
    Result is cached on disk.
  fields:
    emoji:
      name: Emoji
      description: The emoji to display — character (🔔), name (bell), or colon-wrapped name (:bell:).
      required: true
      example: "bell"
      selector:
        text:
    display_for:
      name: Display for
      description: Revert to the previous default after this many seconds.
      required: false
      selector:
        number:
          min: 1
          mode: box
          unit_of_measurement: seconds
    line1:
      name: Line 1
      description: Optional text overlay — first line.
      required: false
      selector:
        text:
    line2:
      name: Line 2
      description: Optional text overlay — second line.
      required: false
      selector:
        text:
    corner:
      name: Corner character
      description: Optional single character to display at the bottom-right corner (e.g. "+" or "-"). Rendered at 2× pixel scale.
      required: false
      selector:
        text:

set_brightness:
  name: Set brightness
  description: >
    Set the display brightness. Publishes to the brightness MQTT topic
    (same base path as the image topic, with /brightness suffix).
    The ESPHome firmware applies the change immediately without re-rendering frames.
  fields:
    brightness:
      name: Brightness
      description: Brightness level from 0 (off) to 255 (full). Default on the display is 200.
      required: true
      selector:
        number:
          min: 0
          max: 255
          mode: slider

clear:
  name: Clear
  description: Publish an empty payload, causing the display to fall back to its built-in clock.
  fields: {}
